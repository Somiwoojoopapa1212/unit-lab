<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="단위 연구소"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#090920"/>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet"/>
  <title>🤖 우주봇 단위 연구소</title>
  <style>
    :root{
      --bg:#090920;--card:rgba(255,255,255,.08);--border:rgba(255,255,255,.14);
      --text:#f0f0ff;--muted:rgba(240,240,255,.52);--yellow:#fbbf24;
      --green:#4ade80;--red:#f87171;
      --cl:#06b6d4;--cw:#f97316;--cv:#60a5fa;--ct:#a78bfa;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
    html,body{width:100%;height:100%;overflow:hidden;
      font-family:'Jua','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);}

    #stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s ease-in-out infinite;}
    @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.9}}

    .screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;z-index:1;
      overflow-y:auto;padding:env(safe-area-inset-top,0px) 0 0;}
    .screen.active{display:flex;}

    /* ─── HOME ─── */
    #s-home{padding:18px 18px 48px;gap:12px;justify-content:flex-start;}
    .home-top{text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px;padding-bottom:4px;}
    .home-robot{font-size:70px;animation:float 3s ease-in-out infinite;line-height:1.1;}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    .home-title{font-size:21px;color:var(--yellow);text-shadow:0 0 16px rgba(251,191,36,.5);}
    .home-sub{font-size:13px;color:var(--muted);}

    .total-bar{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;
      color:var(--muted);background:rgba(255,255,255,.05);border:1px solid var(--border);
      border-radius:12px;padding:7px 16px;width:100%;max-width:360px;}
    .total-bar b{color:var(--yellow);font-size:15px;}

    .planets-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:360px;}
    .planet-card{border-radius:22px;padding:18px 10px 16px;cursor:pointer;
      border:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:7px;
      transition:transform .15s,box-shadow .15s;}
    .planet-card:active{transform:scale(.93);}
    .planet-card.length{background:rgba(6,182,212,.13);border-color:rgba(6,182,212,.32);}
    .planet-card.weight{background:rgba(249,115,22,.13);border-color:rgba(249,115,22,.32);}
    .planet-card.volume{background:rgba(96,165,250,.13);border-color:rgba(96,165,250,.32);}
    .planet-card.time  {background:rgba(167,139,250,.13);border-color:rgba(167,139,250,.32);}
    .p-icon{font-size:48px;line-height:1;}
    .p-name{font-size:16px;font-weight:700;}
    .p-name.length{color:var(--cl);}
    .p-name.weight{color:var(--cw);}
    .p-name.volume{color:var(--cv);}
    .p-name.time  {color:var(--ct);}
    .p-units{font-size:11px;color:var(--muted);text-align:center;line-height:1.55;}
    .p-best{font-size:11px;color:var(--yellow);min-height:15px;}

    /* ─── GAME ─── */
    #s-game{padding:0;justify-content:flex-start;overflow:hidden;}
    .game-hd{display:flex;align-items:center;justify-content:space-between;width:100%;
      padding:10px 16px;flex-shrink:0;padding-top:calc(10px + env(safe-area-inset-top,0px));}
    .btn-back{background:var(--card);border:1px solid var(--border);border-radius:10px;
      font-size:16px;padding:7px 12px;cursor:pointer;color:var(--text);font-family:inherit;}
    .g-planet-lbl{font-size:14px;text-align:center;font-weight:700;}
    .g-star-lbl{font-size:13px;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.32);
      border-radius:20px;padding:5px 12px;white-space:nowrap;}

    .prog-wrap{width:100%;padding:0 16px 8px;flex-shrink:0;}
    .prog-lbl{font-size:11px;color:var(--muted);text-align:right;margin-bottom:4px;}
    .prog-track{height:7px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
    .prog-fill{height:100%;border-radius:4px;transition:width .4s ease;}

    .q-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:8px 18px;width:100%;gap:12px;min-height:0;}
    .q-card{background:var(--card);border:2px solid var(--border);border-radius:26px;
      padding:24px 20px;text-align:center;width:100%;max-width:340px;
      display:flex;flex-direction:column;align-items:center;gap:12px;
      animation:qIn .35s ease;}
    @keyframes qIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .q-emoji{font-size:92px;line-height:1.1;}
    .q-text{font-size:17px;line-height:1.65;}

    .choices{display:flex;gap:10px;width:100%;max-width:344px;padding:0 2px;flex-shrink:0;}
    .choice-btn{flex:1;background:var(--card);border:2.5px solid var(--border);
      border-radius:20px;padding:14px 6px;font-size:22px;font-family:'Jua',sans-serif;
      color:var(--text);cursor:pointer;min-height:68px;display:flex;align-items:center;
      justify-content:center;transition:transform .1s,background .2s,border-color .2s,opacity .2s;}
    .choice-btn:active:not(:disabled){transform:scale(.92);}
    .choice-btn.correct{background:rgba(74,222,128,.22)!important;border-color:var(--green)!important;
      color:var(--green)!important;}
    .choice-btn.wrong{background:rgba(248,113,113,.18)!important;border-color:var(--red)!important;
      color:var(--red)!important;opacity:.55;animation:shake .4s ease;}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

    .fb-strip{flex-shrink:0;width:100%;padding:12px 18px;min-height:86px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:5px;transition:opacity .2s;}
    .fb-strip.hidden{opacity:0;pointer-events:none;min-height:64px;}
    .fb-strip.ok{background:rgba(74,222,128,.13);border-top:2px solid rgba(74,222,128,.32);}
    .fb-strip.ng{background:rgba(248,113,113,.09);border-top:2px solid rgba(248,113,113,.22);}
    .fb-title{font-size:16px;font-weight:700;}
    .fb-title.ok{color:var(--green);}
    .fb-title.ng{color:#fca5a5;}
    .fb-msg{font-size:13px;color:var(--muted);text-align:center;line-height:1.5;max-width:300px;}
    .btn-next{background:var(--green);color:#052e16;border:none;border-radius:13px;
      font-family:'Jua',sans-serif;font-size:15px;padding:10px 30px;cursor:pointer;
      margin-top:3px;transition:transform .1s;}
    .btn-next:active{transform:scale(.95);}

    .star-pop{position:fixed;font-size:30px;pointer-events:none;z-index:50;
      animation:sPop .85s forwards;}
    @keyframes sPop{0%{opacity:1;transform:translateY(0)scale(1)}100%{opacity:0;transform:translateY(-85px)scale(1.5)}}

    /* ─── RESULT ─── */
    #s-result{padding:28px 20px 56px;gap:14px;justify-content:center;}
    .res-emoji{font-size:80px;animation:rPop .5s cubic-bezier(.36,.07,.19,.97);}
    @keyframes rPop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
    .res-title{font-size:24px;color:var(--yellow);text-align:center;}
    .res-card{background:var(--card);border:1.5px solid var(--border);border-radius:24px;
      padding:24px;text-align:center;width:100%;max-width:320px;
      display:flex;flex-direction:column;gap:10px;}
    .res-score{font-size:46px;color:var(--yellow);}
    .res-stars{font-size:36px;letter-spacing:5px;}
    .res-msg{font-size:14px;color:var(--muted);line-height:1.65;}
    .res-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px;}
    .btn-retry{background:var(--yellow);color:#1a0800;border:none;border-radius:14px;
      font-family:'Jua',sans-serif;font-size:17px;padding:14px;cursor:pointer;transition:transform .1s;}
    .btn-retry:active{transform:scale(.96);}
    .btn-other{background:var(--card);color:var(--text);border:1.5px solid var(--border);
      border-radius:14px;font-family:'Jua',sans-serif;font-size:15px;padding:12px;cursor:pointer;}
    .btn-other:active{transform:scale(.97);}

    @media(max-height:680px){
      .q-emoji{font-size:68px;}
      .q-text{font-size:15px;}
      .choice-btn{min-height:56px;font-size:19px;}
      .home-robot{font-size:52px;}
    }
  </style>
</head>
<body>
<div id="stars"></div>

<!-- ══ HOME ══ -->
<div class="screen active" id="s-home">
  <div class="home-top">
    <span class="home-robot">🤖</span>
    <div class="home-title">우주봇 단위 연구소</div>
    <div class="home-sub">물건에 알맞은 단위를 골라봐요! ✨</div>
  </div>

  <div class="total-bar">
    <span>🌟 내가 모은 별</span>
    <b id="total-stars">0</b>
    <span>개</span>
  </div>

  <div class="planets-grid">
    <div class="planet-card length" onclick="startCat('length')">
      <div class="p-icon">📏</div>
      <div class="p-name length">길이 행성</div>
      <div class="p-units">mm · cm · m · km</div>
      <div class="p-best" id="best-length"></div>
    </div>
    <div class="planet-card weight" onclick="startCat('weight')">
      <div class="p-icon">⚖️</div>
      <div class="p-name weight">무게 행성</div>
      <div class="p-units">mg · g · kg</div>
      <div class="p-best" id="best-weight"></div>
    </div>
    <div class="planet-card volume" onclick="startCat('volume')">
      <div class="p-icon">💧</div>
      <div class="p-name volume">용량 행성</div>
      <div class="p-units">ml · L</div>
      <div class="p-best" id="best-volume"></div>
    </div>
    <div class="planet-card time" onclick="startCat('time')">
      <div class="p-icon">⏰</div>
      <div class="p-name time">시간 행성</div>
      <div class="p-units">초 · 분 · 시간</div>
      <div class="p-best" id="best-time"></div>
    </div>
  </div>
</div>

<!-- ══ GAME ══ -->
<div class="screen" id="s-game">
  <div class="game-hd">
    <button class="btn-back" onclick="goHome()">🏠</button>
    <div class="g-planet-lbl" id="g-planet-lbl">📏 길이 행성</div>
    <div class="g-star-lbl">⭐ <span id="g-star-cnt">0</span></div>
  </div>

  <div class="prog-wrap">
    <div class="prog-lbl"><span id="g-qnum">1</span> / <span id="g-qtot">8</span></div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="q-area">
    <div class="q-card" id="q-card">
      <div class="q-emoji" id="q-emoji">🤖</div>
      <div class="q-text" id="q-text">문제가 로드됩니다</div>
    </div>
  </div>

  <div class="choices" id="choices">
    <button class="choice-btn" id="c0" onclick="pick(0)">mm</button>
    <button class="choice-btn" id="c1" onclick="pick(1)">kg</button>
    <button class="choice-btn" id="c2" onclick="pick(2)">L</button>
  </div>

  <div class="fb-strip hidden" id="fb-strip">
    <div class="fb-title" id="fb-title">맞았어요! 🎉</div>
    <div class="fb-msg" id="fb-msg"></div>
    <button class="btn-next" id="btn-next" onclick="nextQ()">다음 문제 →</button>
  </div>
</div>

<!-- ══ RESULT ══ -->
<div class="screen" id="s-result">
  <div class="res-emoji" id="res-emoji">🎉</div>
  <div class="res-title">연구 완료!</div>
  <div class="res-card">
    <div class="res-score" id="res-score">8 / 8</div>
    <div class="res-stars" id="res-stars">⭐⭐⭐</div>
    <div class="res-msg" id="res-msg">우주봇이 단위 연구를 완료했어요!</div>
  </div>
  <div class="res-btns">
    <button class="btn-retry" onclick="retryCat()">🔁 다시 하기</button>
    <button class="btn-other" onclick="goHome()">🪐 다른 행성 도전</button>
  </div>
</div>

<script>
/* ════ 데이터 ════ */
const CATS = {
  length:{name:'📏 길이 행성', color:'var(--cl)', fill:'rgba(6,182,212,.65)'},
  weight:{name:'⚖️ 무게 행성', color:'var(--cw)', fill:'rgba(249,115,22,.65)'},
  volume:{name:'💧 용량 행성', color:'var(--cv)', fill:'rgba(96,165,250,.65)'},
  time:  {name:'⏰ 시간 행성', color:'var(--ct)', fill:'rgba(167,139,250,.65)'},
};

const QS = {
  length:[
    {e:'🐜',q:'개미의 길이를 잴 때 알맞은 단위는?',c:['mm','kg','L'],a:'mm',
     ok:'맞았어요! 개미처럼 아주 작은 길이는 mm로 잴 수 있어요.',ng:'조금 아쉬워요! 개미는 아주 작아서 mm가 잘 어울려요.'},
    {e:'✏️',q:'연필의 길이를 잴 때 알맞은 단위는?',c:['cm','ml','kg'],a:'cm',
     ok:'맞았어요! 손에 잡히는 물건의 길이는 cm가 어울려요.',ng:'조금 아쉬워요! 연필 길이는 cm로 재요.'},
    {e:'👆',q:'손가락 한 마디 길이를 잴 때 알맞은 단위는?',c:['cm','km','L'],a:'cm',
     ok:'맞았어요! 손가락 마디처럼 짧은 길이는 cm가 어울려요.',ng:'조금 아쉬워요! 손가락 마디는 짧아서 cm가 어울려요.'},
    {e:'🚪',q:'문 높이를 잴 때 알맞은 단위는?',c:['m','mg','ml'],a:'m',
     ok:'맞았어요! 문이나 사람 키처럼 큰 길이는 m로 나타낼 수 있어요.',ng:'조금 아쉬워요! 문 높이는 꽤 크기 때문에 m가 어울려요.'},
    {e:'🧍',q:'사람 키를 잴 때 알맞은 단위는?',c:['m','mm','g'],a:'m',
     ok:'맞았어요! 사람 키는 m로 나타내요.',ng:'조금 아쉬워요! 키는 꽤 크기 때문에 m가 어울려요.'},
    {e:'🚗',q:'도시 사이의 먼 거리를 나타낼 때 알맞은 단위는?',c:['km','cm','g'],a:'km',
     ok:'맞았어요! 아주 먼 거리는 km로 나타내요.',ng:'조금 아쉬워요! 도시 사이처럼 먼 거리는 km가 어울려요.'},
    {e:'🗺️',q:'서울에서 부산까지 거리를 나타낼 때 알맞은 단위는?',c:['km','m','ml'],a:'km',
     ok:'맞았어요! 서울~부산처럼 아주 먼 거리는 km로 나타내요.',ng:'조금 아쉬워요! 서울~부산처럼 먼 거리는 km가 어울려요.'},
    {e:'📚',q:'책 한 권의 두께를 잴 때 알맞은 단위는?',c:['mm','km','kg'],a:'mm',
     ok:'맞았어요! 얇은 물건의 두께는 mm로 잴 수 있어요.',ng:'조금 아쉬워요! 책 두께처럼 아주 얇은 것은 mm가 어울려요.'},
  ],
  weight:[
    {e:'💊',q:'약 한 알의 무게를 나타낼 때 알맞은 단위는?',c:['mg','km','L'],a:'mg',
     ok:'맞았어요! 약처럼 아주 가벼운 것은 mg로 나타낼 수 있어요.',ng:'조금 아쉬워요! 약 한 알은 아주 가벼우니까 mg가 어울려요.'},
    {e:'🍎',q:'사과 한 개의 무게를 나타낼 때 알맞은 단위는?',c:['g','m','ml'],a:'g',
     ok:'맞았어요! 사과처럼 가벼운 물건의 무게는 g으로 나타낼 수 있어요.',ng:'조금 아쉬워요! 사과는 무게를 재는 g이 어울려요.'},
    {e:'🍓',q:'딸기 한 알의 무게를 나타낼 때 알맞은 단위는?',c:['g','km','L'],a:'g',
     ok:'맞았어요! 딸기처럼 가벼운 물건의 무게는 g으로 나타낼 수 있어요.',ng:'조금 아쉬워요! 딸기 한 알의 무게는 g이 어울려요.'},
    {e:'🎒',q:'가방의 무게를 나타낼 때 알맞은 단위는?',c:['kg','cm','L'],a:'kg',
     ok:'맞았어요! 가방처럼 비교적 무거운 물건은 kg로 나타낼 수 있어요.',ng:'조금 아쉬워요! 가방의 무게는 kg가 어울려요.'},
    {e:'👦',q:'사람 몸무게를 나타낼 때 알맞은 단위는?',c:['kg','mm','ml'],a:'kg',
     ok:'맞았어요! 사람 몸무게는 보통 kg로 나타내요.',ng:'조금 아쉬워요! 몸무게는 무게이기 때문에 kg가 어울려요.'},
    {e:'🌾',q:'쌀 한 포대의 무게를 나타낼 때 알맞은 단위는?',c:['kg','mm','ml'],a:'kg',
     ok:'맞았어요! 쌀 한 포대처럼 무거운 것은 kg로 나타내요.',ng:'조금 아쉬워요! 쌀 한 포대는 꽤 무거우니까 kg가 어울려요.'},
    {e:'🍬',q:'사탕 한 알의 무게를 나타낼 때 알맞은 단위는?',c:['g','km','L'],a:'g',
     ok:'맞았어요! 사탕처럼 가벼운 물건의 무게는 g으로 나타낼 수 있어요.',ng:'조금 아쉬워요! 사탕 한 알의 무게는 g이 어울려요.'},
    {e:'🔬',q:'아주 가벼운 가루약 무게를 나타낼 때 알맞은 단위는?',c:['mg','m','L'],a:'mg',
     ok:'맞았어요! 아주 작고 가벼운 것은 mg로 나타낼 수 있어요.',ng:'조금 아쉬워요! 아주 가벼운 가루약은 mg가 어울려요.'},
  ],
  volume:[
    {e:'🥄',q:'약 한 숟가락의 양을 나타낼 때 알맞은 단위는?',c:['ml','kg','km'],a:'ml',
     ok:'맞았어요! 적은 양의 액체는 ml로 나타낼 수 있어요.',ng:'조금 아쉬워요! 한 숟가락처럼 적은 액체의 양은 ml가 어울려요.'},

const BKEY = c => `unit_best_${c}`;

/* ════ 상태 ════ */
let cat='length', qs=[], qi=0, score=0, stars=0, firstTry=true, answered=false;

/* ════ 홈 ════ */
function renderHome(){
  let tot=0;
  ['length','weight','volume','time'].forEach(c=>{
    const b=parseInt(localStorage.getItem(BKEY(c))||'0');
    tot+=b;
    const el=document.getElementById(`best-${c}`);
    el.textContent=b?`최고 ⭐ ${b}개`:'';
  });
  document.getElementById('total-stars').textContent=tot;
}

function goHome(){
  showScreen('s-home');
  renderHome();
}

/* ════ 게임 시작 ════ */
function startCat(c){
  cat=c; answered=false;
  qs=[...QS[c]].sort(()=>Math.random()-.5);
  qi=0; score=0; stars=0;
  const info=CATS[c];
  document.getElementById('g-planet-lbl').textContent=info.name;
  document.getElementById('g-planet-lbl').style.color=info.color;
  document.getElementById('prog-fill').style.background=info.fill;
  document.getElementById('g-qtot').textContent=qs.length;
  document.getElementById('g-star-cnt').textContent=0;
  hideFb();
  loadQ();
  showScreen('s-game');
}

function loadQ(){
  const q=qs[qi];
  firstTry=true; answered=false;
  hideFb();
  document.getElementById('q-emoji').textContent=q.e;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('g-qnum').textContent=qi+1;
  document.getElementById('prog-fill').style.width=((qi/qs.length)*100)+'%';

  const card=document.getElementById('q-card');
  card.style.animation='none';
  requestAnimationFrame(()=>{ card.style.animation=''; });

  document.getElementById('choices').innerHTML=q.c.map((ch,i)=>
    `<button class="choice-btn" id="c${i}" onclick="pick(${i})">${ch}</button>`
  ).join('');
}

/* ════ 답 선택 ════ */
function pick(i){
  if(answered) return;
  const q=qs[qi];
  const btn=document.getElementById(`c${i}`);
  if(q.c[i]===q.a){
    answered=true; score++;
    if(firstTry){ stars++; document.getElementById('g-star-cnt').textContent=stars; popStar(btn); }
    btn.classList.add('correct');
    document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
    showFb(true,q.ok);
  } else {
    firstTry=false;
    btn.classList.add('wrong'); btn.disabled=true;
    setTimeout(()=>btn.classList.remove('wrong'),450);
    showFb(false,q.ng);
  }
}

/* ════ 피드백 ════ */
function showFb(ok,msg){
  const s=document.getElementById('fb-strip');
  const t=document.getElementById('fb-title');
  s.className=`fb-strip ${ok?'ok':'ng'}`;
  t.className=`fb-title ${ok?'ok':'ng'}`;
  t.textContent=ok?'맞았어요! 🎉':'조금 아쉬워요! 💪';
  document.getElementById('fb-msg').textContent=msg;
  document.getElementById('btn-next').style.display=ok?'block':'none';
}
function hideFb(){ document.getElementById('fb-strip').className='fb-strip hidden'; }

function nextQ(){
  qi++;
  if(qi>=qs.length) showResult();
  else loadQ();
}

/* ════ 별 애니메이션 ════ */
function popStar(el){
  const r=el.getBoundingClientRect();
  const s=document.createElement('div');
  s.className='star-pop'; s.textContent='⭐';
  s.style.cssText=`left:${r.left+r.width/2-15}px;top:${r.top-10}px;`;
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),950);
}

/* ════ 결과 ════ */
function showResult(){
  const tot=qs.length;
  const pct=score/tot;
  const sc=pct===1?3:pct>=.75?2:pct>=.5?1:0;
  const prev=parseInt(localStorage.getItem(BKEY(cat))||'0');
  if(stars>prev) localStorage.setItem(BKEY(cat),String(stars));

  document.getElementById('res-emoji').textContent=pct===1?'🏆':pct>=.75?'🎉':'😊';
  document.getElementById('res-score').textContent=`${score} / ${tot}`;
  document.getElementById('res-stars').textContent='⭐'.repeat(sc)+'☆'.repeat(3-sc);
  const msgs=[
    '괜찮아요! 우주봇과 함께 다시 연습해봐요! 💪',
    '잘하고 있어요! 조금만 더 연습하면 완벽해요!',
    '대단해요! 단위를 정말 잘 알고 있어요! 🚀',
    '완벽해요! 우주봇 단위 박사가 됐어요! 🏆',
  ];
  document.getElementById('res-msg').textContent=msgs[sc];
  document.getElementById('prog-fill').style.width='100%';
  showScreen('s-result');
}

function retryCat(){ startCat(cat); }

/* ════ 유틸 ════ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<130;i++){
    const s=document.createElement('span'); s.className='star';
    const sz=Math.random()*2+.5;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;animation-delay:${(Math.random()*4).toFixed(2)}s;animation-duration:${(2+Math.random()*3).toFixed(2)}s`;
    c.appendChild(s);
  }
})();

renderHome();
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
